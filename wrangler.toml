# Cloudflare Pages project config for the tsd-boarddocs site.
# Static assets (index.html) live at the repo root; Pages Functions live in
# functions/. Bindings below are available to those Functions as `env.AI` and
# `env.VECTORIZE`. The site itself deploys via git push (Pages Git integration);
# this file supplies the bindings and lets `wrangler pages deploy` work too.
name = "tsd-boarddocs"
compatibility_date = "2026-06-01"
pages_build_output_dir = "."

# Workers AI — @cf/baai/bge-base-en-v1.5 (768-dim). Same model used to embed the
# corpus, so query and passage vectors share one space.
[ai]
binding = "AI"

# Vectorize index holding the chunk vectors + citation metadata.
[[vectorize]]
binding = "VECTORIZE"
index_name = "tsd-boarddocs"
