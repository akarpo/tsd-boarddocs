# Cloudflare Worker config for tsd-boarddocs.
# The Git build runs `wrangler deploy`, which reads this file: worker.js is the
# entry point, ./public is served as static assets, and the AI + Vectorize
# bindings are applied automatically (no manual dashboard binding needed).
name = "tsd-boarddocs"
main = "worker.js"
compatibility_date = "2026-06-01"

# Static site. Assets matching a request path are served directly; everything
# else (/api/*, /mcp) falls through to the Worker.
[assets]
directory = "./public"
binding = "ASSETS"

# D1 — full-text (FTS5) keyword/BM25 search index. Replaces Workers AI + Vectorize.
[[d1_databases]]
binding = "DB"
database_name = "tsd-boarddocs"
database_id = "3e09875f-4993-45f6-8e77-bcfb809bcad4"

# R2 — source documents, served same-origin through the Worker's /doc route.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "media"
